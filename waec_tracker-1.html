    {s:"math",       tp:"Number & Numeration",         k:"Indices, logs, number bases — concepts + 10 practice Qs"},
    {s:"physics",    tp:week<=12?"Mechanics — Motion":"Forces & Equilibrium", k:week<=12?"Equations of motion + velocity-time graphs":"Moments, levers, pulleys — structured practice"},
    {s:"chemistry",  tp:week<=12?"Atomic Structure & Periodic Table":"Acids, Bases & Salts", k:week<=12?"Electronic config + periodic trends":"Titration calculations + salt preparation"},
    {s:"english",    tp:"Comprehension",                k:"Read passage, answer in full sentences — 20 min"},
    {s:"techDrawing",tp:"Geometric Construction",       k:"Bisect angles + construct regular polygons — 3 exercises"},
    {s:week<=12?"math":"ict", tp:week<=12?"Algebraic Processes":"Computer Fundamentals", k:week<=12?"Factorisation + simultaneous equations":"Generations, hardware types — theory notes"},
    {s:"geography",  tp:"Map Reading & Interpretation", k:"Contour interpretation + draw one cross-section"},
  ];
  if(week<=48)return[
    {s:"math",       tp:"Statistics & Probability",    k:"5 past WAEC questions timed — show all working"},
    {s:"physics",    tp:"Electricity — Circuits",      k:"5 past WAEC Qs timed — Ohm's law + internal resistance"},
    {s:"chemistry",  tp:"Organic Chemistry",            k:"5 past WAEC Qs timed — IUPAC naming + reactions"},
    {s:"english",    tp:"Essay Writing",                k:"Write a full essay in 45 min — check structure + word count"},
    {s:"techDrawing",tp:"Orthographic Projection",      k:"Past WAEC drawing papers — 1st & 3rd angle both"},
    {s:"ict",        tp:"Number Systems & Data Representation", k:"Past Qs — binary conversions, base changes"},
    {s:"civic",      tp:"Nigerian Constitution & Government", k:"Past Qs — rights, arms, arms of government"},
  ];
  return[
    {s:"math",       tp:"Geometry & Circle Theorems",  k:"Full mock paper section — timed, mark and review"},
    {s:"physics",    tp:"Waves & Sound",                k:"Full mock paper — timed"},
    {s:"chemistry",  tp:"Redox & Electrochemistry",     k:"Weak topic revision — write half-equations from memory"},
    {s:"english",    tp:"Oral English & Phonology",     k:"Full mock paper — timed"},
    {s:"techDrawing",tp:"Isometric & Oblique Drawing",  k:"Full past paper — timed"},
    {s:"biology",    tp:week<=64?"Genetics & Inheritance":"Ecology & Environment", k:week<=64?"Punnett squares + sex-linked crosses — revision":"Food webs + nitrogen cycle — final revision"},
    {s:"civic",      tp:"Human Rights & Social Issues", k:"Key-facts revision — EFCC, UDHR, fundamental rights"},
  ];
}

function saveState(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function getPhase(w){return PHASES.find(p=>w>=p.weeks[0]&&w<=p.weeks[1]);}
function subjById(id){return SUBJ.find(s=>s.id===id);}
function getTopicData(sid,tname){const arr=TOPICS[sid]||[];return arr.find(t=>t.t===tname)||arr[0]||null;}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}

function updateHeader(){
  const p=getPhase(state.currentWeek);
  const pct=Math.round((state.currentWeek/TOTAL)*100);
  const ts=Object.values(state.subjectProgress).reduce((a,b)=>a+b,0);
  document.getElementById("hw").innerHTML=`Week ${state.currentWeek} <span style="color:${p.color};font-size:14px;font-weight:500">/ ${TOTAL}</span>`;
  const pb=document.getElementById("pb");
  pb.style.background=p.color+"22";pb.style.border=`1px solid ${p.color}44`;
  document.getElementById("pbl").style.color=p.color;
  document.getElementById("pbl").textContent=`Phase ${p.id}`;
  document.getElementById("pbn").textContent=p.name;
  document.getElementById("opct").textContent=`${pct}% complete`;
  document.getElementById("tsess").textContent=`${ts} sessions done`;
  const bar=document.getElementById("obar");
  bar.style.width=`${pct}%`;
  bar.style.background=`linear-gradient(90deg,${p.color},${p.color}88)`;
  const pfBtn=document.getElementById("profile-btn");
  if(pfBtn)pfBtn.textContent=initials(state.userName);
}

function switchTab(tab){
  activeTab=tab;expandedDay=null;
  ["week","subjects","phases","tutor"].forEach(t=>{
    const btn=document.getElementById(`tab-${t}`);
    const p=getPhase(state.currentWeek);
    btn.style.background=t===tab?p.color:"#1E1E2E";
    btn.style.color=t===tab?"#000":"#666";
  });
  renderContent();
}

function renderWeek(){
  const p=getPhase(state.currentWeek);
  const days=weekPlan(state.currentWeek);
  const dc=days.filter((_,i)=>state.completedDays[`${state.currentWeek}-${i}`]).length;
  let h=`<div class="wcard"><div class="wcard-lbl">This week's focus</div><div class="wcard-desc">${p.desc} — Months ${p.months}</div><div class="wmini-bar"><div class="wmini-fill" style="width:${(dc/days.length)*100}%;background:${p.color}"></div></div><div class="wmini-lbl">${dc}/${days.length} sessions done · Tap a card to see WAEC topics</div></div>`;
  days.forEach((day,i)=>{
    const subj=subjById(day.s);
    const isDone=!!state.completedDays[`${state.currentWeek}-${i}`];
    const isEx=expandedDay===i;
    const td=getTopicData(day.s,day.tp);
    h+=`<div class="dcard ${isDone?'done':''}" style="border-color:${isDone?subj.color+'44':'#1E1E2E'}">
      <div class="dcard-main" onclick="toggleExpand(${i})">
        <div class="dicon" style="background:${subj.color}22">${isDone?'✅':subj.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="dname" style="color:${isDone?'#555':'#E8E8F0'}">${subj.name} <span class="dtopic" style="color:${subj.color}">· ${day.tp}</span></div>
          <div class="dtask ${isDone?'sk':''}">${day.k}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          <div class="dtarget" style="background:${subj.color}22;color:${subj.color}">${subj.target}</div>
          <div class="darrow">${isEx?'▲':'▼'}</div>
        </div>
      </div>
      ${isEx&&td?`<div class="drawer"><div class="drawer-inner">
        <div class="drawer-section">
          <div class="drawer-lbl">📌 What to study — real WAEC topics</div>
          <div style="margin-bottom:8px">${td.subs.split(', ').slice(0,8).map(s=>`<span class="topic-pill" style="background:${subj.color}15;color:${subj.color}cc;border:1px solid ${subj.color}30">${s.trim()}</span>`).join('')}</div>
          <span class="freq-badge" style="background:${subj.color}20;color:${subj.color};border-color:${subj.color}44">${td.freq}</span>
        </div>
        <div class="drawer-section">
          <div class="drawer-lbl">💡 Exam Tip</div>
          <div class="tips-text">${td.tip}</div>
        </div>
        <button class="mark-btn" style="background:${isDone?'#1E1E2E':subj.color};color:${isDone?'#555':'#000'}" onclick="markDone(${i})">${isDone?'✓ Done — tap to undo':'✅ Mark Session Done'}</button>
          <button class="mark-btn" style="background:transparent;color:${subj.color};border:1px solid ${subj.color}44;margin-top:8px;" onclick="openTutor('${day.s}','${day.tp}')">🤖 Teach Me Step-by-Step</button>
      </div></div>`:''}
    </div>`;
  });
  const can=state.currentWeek<TOTAL;
  h+=`<button class="adv-btn" style="background:${can?`linear-gradient(135deg,${p.color},${p.color}88)`:'#1E1E2E'};color:${can?'#000':'#555'};cursor:${can?'pointer':'default'}" onclick="${can?'advanceWeek()':''}">${can?`Complete Week ${state.currentWeek} → Week ${state.currentWeek+1}`:'🎉 All 72 Weeks Done!'}</button>`;
  return h;
}

function renderSubjects(){
  let h=`<div class="shint">🎯 These are the topics that appear most in real WAEC exams — verified from past papers.<br>🔥 = every year &nbsp;⚡ = most years<br>Tap <strong>+</strong> after each study session to log progress.</div>`;
  SUBJ.forEach(subj=>{
    const sess=state.subjectProgress[subj.id]||0;
    const pct=Math.min((sess/80)*100,100);
    const topics=TOPICS[subj.id]||[];
    h+=`<div class="scard"><div class="scard-top">
      <div class="srow">
        <div class="sleft"><span class="semoji">${subj.emoji}</span><div><div class="sname">${subj.name}</div><div class="ssess">${sess} sessions logged</div></div></div>
        <div class="sright"><span class="starget" style="background:${subj.color}22;color:${subj.color}">${subj.target}</span><button class="splus" style="background:${subj.color}22;color:${subj.color};border:1px solid ${subj.color}44" onclick="logSession('${subj.id}')">+</button></div>
      </div>
      <div class="sbar-bg"><div class="sbar-fill" style="width:${pct}%;background:${subj.color}"></div></div>
    </div>
    <div class="stopics"><div class="stopics-lbl">High-frequency WAEC topics</div>
    ${topics.map(tp=>`<div class="htopic">
      <div class="htopic-row"><div class="htopic-name">${tp.t}</div><span class="hfreq" style="background:${subj.color}20;color:${subj.color}">${tp.freq.split(' ')[0]}</span></div>
      <div class="htopic-sub">${tp.subs.length>200?tp.subs.substring(0,200)+'…':tp.subs}</div>
      <div class="htip" style="color:${subj.color}99">💡 ${tp.tip}</div>
          <button onclick="openTutor('${subj.id}','${tp.t}')" style="background:transparent;border:none;color:${subj.color};font-size:10px;font-weight:700;padding:5px 0;cursor:pointer;text-transform:uppercase;letter-spacing:1px;">🤖 AI Tutor: Start Lesson →</button>
    </div>`).join('')}
    </div></div>`;
  });
  return h;
}

function renderPhases(){
  let h="";
  PHASES.forEach(p=>{
    const isA=state.currentWeek>=p.weeks[0]&&state.currentWeek<=p.weeks[1];
    const isDone=state.currentWeek>p.weeks[1];
    h+=`<div class="phcard" style="border-color:${isA?p.color+'55':'#1E1E2E'}">${isA?`<div class="phbar" style="background:${p.color}"></div>`:''}
      <div class="phstatus" style="color:${p.color}">${isDone?'✓ Complete':isA?'● Active':'Upcoming'}</div>
      <div class="phtitle">Phase ${p.id}: ${p.name}</div>
      <div class="phdates">Months ${p.months} · Weeks ${p.weeks[0]}–${p.weeks[1]}</div>
      <div class="phdesc">${p.desc}</div>
      ${isA?`<div class="phhere" style="background:${p.color}15;color:${p.color}">You are here — Week ${state.currentWeek} of ${p.weeks[1]}</div>`:''}
    </div>`;
  });
  h+=`<div class="nncard"><div class="nntitle">📌 Daily Non-Negotiables</div>
  ${[["🔢","Math every single day","Not sometimes. Every day. No exceptions ever."],
     ["📝","English 20 min daily","Read anything in English. Active reading, not passive."],
     ["📐","Tech Drawing 3x/week","You need physical reps with instruments. Cannot shortcut this."],
     ["⏱️","Always time yourself","WAEC is strict on time. Build the habit from Week 1."],
     ["📋","Write out every mistake","Don't just circle it. Write the full correct working. That's how you fix it."],
     ["🔥","Use real past WAEC papers","Not random questions. Actual past WAEC papers from actual exams."],
  ].map(([e,n,r])=>`<div class="nnrow"><span style="font-size:18px">${e}</span><div><div class="nnname">${n}</div><div class="nnrule">${r}</div></div></div>`).join('')}
  </div>`;
  return h;
}

function renderContent(){
  const c=document.getElementById("content");
  if(activeTab==="week")c.innerHTML=renderWeek();
  else if(activeTab==="subjects")c.innerHTML=renderSubjects();
  else if(activeTab==="phases")c.innerHTML=renderPhases();
  else c.innerHTML=renderTutorTab();
}

function renderTutorTab(){
  let h=`<div class="shint">🤖 <strong>AI Tutor Mode</strong><br>Select any topic below to start a step-by-step beginner lesson. I'll break it down so it's easy to understand.</div>`;
  SUBJ.forEach(subj=>{
    const topics=TOPICS[subj.id]||[];
    h+=`<div class="scard" style="border-left:4px solid ${subj.color}">
      <div class="scard-top" style="padding:12px 14px;">
        <div class="srow" style="margin-bottom:0;">
          <div class="sleft"><span class="semoji">${subj.emoji}</span><div class="sname">${subj.name}</div></div>
        </div>
      </div>
      <div style="padding:0 14px 14px;">
        ${topics.map(tp=>`<div onclick="openTutor('${subj.id}','${tp.t}')" style="background:#1A1A28;padding:10px;border-radius:8px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
          <div style="font-size:12px;font-weight:500;">${tp.t}</div>
          <div style="font-size:10px;color:${subj.color};font-weight:700;">TEACH ME →</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  return h;
}

function openTutor(sid, tname){
  const subj = subjById(sid);
  const td = getTopicData(sid, tname);
  if(!td) return;
  
  tutorTopic = {sid, ...td};
  const modal = document.getElementById("tutor-modal");
  const title = document.getElementById("tutor-title");
  const content = document.getElementById("tutor-content");
  
  title.innerHTML = `<span style="color:${subj.color}">${subj.emoji} ${tname}</span>`;
  
  const steps = td.subs.split(',').map(s => s.trim());
  
  content.innerHTML = `
    <div style="background:${subj.color}15;border:1px solid ${subj.color}33;padding:15px;border-radius:12px;margin-bottom:20px;">
      <div style="font-size:11px;color:${subj.color};text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:700;">The Big Picture</div>
      <div style="font-size:14px;line-height:1.6;color:#E8E8F0;">
        "Hey! Let's master <strong>${tname}</strong>. This topic is ${td.freq.toLowerCase()}. 
        Don't worry if it seems hard—we'll take it one small step at a time."
      </div>
    </div>
    
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:700;">Step-by-Step Roadmap</div>
      ${steps.map((step, i) => `
        <div style="display:flex;gap:12px;margin-bottom:15px;background:#12121A;padding:12px;border-radius:10px;border:1px solid #1E1E2E;">
          <div style="width:24px;height:24px;background:${subj.color};color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;">${i+1}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:4px;">${step}</div>
            <div style="font-size:11px;color:#777;line-height:1.4;">Focus on understanding the core logic here before moving to the next step.</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="background:#1E1E2E;padding:15px;border-radius:12px;margin-bottom:20px;border-left:4px solid #FFD700;">
      <div style="font-size:11px;color:#FFD700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:700;">💡 Pro Exam Tip</div>
      <div style="font-size:12px;line-height:1.6;color:#ccc;">${td.tip}</div>
    </div>

    <div style="background:#0A0A0F;border:1px solid #1E1E2E;padding:15px;border-radius:12px;margin-bottom:80px;">
      <div style="font-size:11px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:700;">Beginner Practice Task</div>
      <div style="font-size:13px;color:#E8E8F0;margin-bottom:10px;">Go to your textbook and solve <strong>3 simple examples</strong> of "${steps[0]}".</div>
      <div style="font-size:11px;color:#555;">Once you get those right, you've officially started! Move to step 2.</div>
    </div>
  `;
  
  modal.style.display = "block";
  document.body.style.overflow = "hidden";
}

function closeTutor(){
  document.getElementById("tutor-modal").style.display = "none";
  document.body.style.overflow = "auto";
}

function render(){updateHeader();switchTab(activeTab);}
function toggleExpand(i){expandedDay=expandedDay===i?null:i;renderContent();}
function markDone(i){
  const key=`${state.currentWeek}-${i}`;
  state.completedDays[key]=!state.completedDays[key];
  const days=weekPlan(state.currentWeek);
  const subj=subjById(days[i].s);
  if(state.completedDays[key]){showToast(`${subj.emoji} ${days[i].tp} done!`);recordActivity();}
  saveState();expandedDay=null;render();
}
function logSession(id){
  state.subjectProgress[id]=(state.subjectProgress[id]||0)+1;
  const subj=subjById(id);showToast(`${subj.emoji} Session logged!`);
  recordActivity();saveState();renderContent();
}
function advanceWeek(){
  if(state.currentWeek>=TOTAL)return;
  state.currentWeek++;expandedDay=null;
  showToast(`🚀 Week ${state.currentWeek} unlocked!`);
  saveState();render();
}

const SW=`const C='waec-v5';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));});`;
if('serviceWorker'in navigator){try{const b=new Blob([SW],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}catch(e){}}
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('ibanner').style.display='block';});
document.getElementById('ibtn').addEventListener('click',()=>{if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;document.getElementById('ibanner').style.display='none';});}});

/* ===== Profile Logic ===== */
const ACHIEVEMENTS=[
  {icon:"🌱",title:"First Step",desc:"Complete your first session",test:s=>totalSessions(s)>=1},
  {icon:"🔥",title:"7-Day Streak",desc:"Study 7 days in a row",test:s=>(s.streak||0)>=7},
  {icon:"📅",title:"Week Warrior",desc:"Fully complete any week",test:s=>{for(let w=1;w<=state.currentWeek;w++){const d=weekPlan(w);if(d.length&&d.every((_,i)=>s.completedDays[`${w}-${i}`]))return true;}return false;}},
  {icon:"🚀",title:"Phase 1 Complete",desc:"Reach Week 25 — Foundation done",test:s=>s.currentWeek>=25},
  {icon:"💯",title:"Halfway Hero",desc:"Reach Week 36 — the midpoint",test:s=>s.currentWeek>=36},
  {icon:"🎯",title:"All-Rounder",desc:"Log a session in every subject",test:s=>SUBJ.every(sub=>(s.subjectProgress[sub.id]||0)>=1)},
  {icon:"🏆",title:"Century Club",desc:"Log 100 total sessions",test:s=>totalSessions(s)>=100},
  {icon:"🌟",title:"Finisher",desc:"Complete all 72 weeks",test:s=>s.currentWeek>=TOTAL},
];
function totalSessions(s){return Object.values(s.subjectProgress).reduce((a,b)=>a+b,0);}
function subjMastery(id){
  const sessions=state.subjectProgress[id]||0;
  const topics=(TOPICS[id]||[]).length||1;
  const targetSessions=topics*3;
  return Math.min(100,Math.round((sessions/targetSessions)*100));
}
function initials(name){
  const parts=(name||"").trim().split(/\s+/).filter(Boolean);
  if(!parts.length)return "S";
  return parts.slice(0,2).map(w=>w[0].toUpperCase()).join('');
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function recordActivity(){
  const today=todayStr();
  if(state.lastActiveDate===today)return;
  const y=new Date();y.setDate(y.getDate()-1);
  const yesterday=y.toISOString().slice(0,10);
  state.streak=(state.lastActiveDate===yesterday)?(state.streak||0)+1:1;
  state.lastActiveDate=today;
}
function updateName(val){
  state.userName=val||"Student";saveState();updateHeader();
  const av=document.getElementById("pf-avatar");
  if(av)av.textContent=initials(state.userName);
}
function updateGrade(val){state.targetGrade=val;saveState();}
function resetProgress(){
  if(!confirm("Reset all progress? This clears your week, sessions, streak and completed days. Your name and target grade stay. This can't be undone."))return;
  state={...state,currentWeek:1,completedDays:{},subjectProgress:{},streak:0,lastActiveDate:null};
  saveState();
  closeProfile();
  expandedDay=null;
  render();
  showToast("🔄 Progress reset");
}
function openProfile(){
  renderProfile();
  document.getElementById("profile-modal").style.display="block";
  document.body.style.overflow="hidden";
}
function closeProfile(){
  document.getElementById("profile-modal").style.display="none";
  document.body.style.overflow="auto";
}
function renderProfile(){
  const pct=Math.round((state.currentWeek/TOTAL)*100);
  const sessions=totalSessions(state);
  const daysDone=Object.values(state.completedDays).filter(Boolean).length;
  const unlockedCount=ACHIEVEMENTS.filter(a=>a.test(state)).length;

  let h=`
  <div class="pf-head">
    <div class="pf-avatar" id="pf-avatar">${initials(state.userName)}</div>
    <div style="flex:1;min-width:0">
      <input class="pf-input" id="pf-name" value="${(state.userName||"").replace(/"/g,'&quot;')}" placeholder="Your name" onchange="updateName(this.value)">
      <input class="pf-grade-input" id="pf-grade" value="${(state.targetGrade||"").replace(/"/g,'&quot;')}" placeholder="🎯 Set your target (e.g. 8 A1s)" onchange="updateGrade(this.value)">
    </div>
  </div>

  <div class="pf-section-lbl">Overall Progress</div>
  <div class="pstat-grid">
    <div class="pstat-card"><div class="pstat-val">🔥 ${state.streak||0}</div><div class="pstat-lbl">Day streak</div></div>
    <div class="pstat-card"><div class="pstat-val">${sessions}</div><div class="pstat-lbl">Sessions logged</div></div>
    <div class="pstat-card"><div class="pstat-val">${pct}%</div><div class="pstat-lbl">Plan complete · Week ${state.currentWeek}/${TOTAL}</div></div>
    <div class="pstat-card"><div class="pstat-val">${daysDone}</div><div class="pstat-lbl">Study days ticked off</div></div>
  </div>

  <div class="pf-section-lbl">Subject Mastery</div>
  ${SUBJ.map(sub=>{
    const m=subjMastery(sub.id);
    const s=state.subjectProgress[sub.id]||0;
    return `<div class="pmastery-row">
      <div class="pmastery-top">
        <div class="pmastery-name">${sub.emoji} ${sub.name} <span style="font-size:9px;color:${sub.color};border:1px solid ${sub.color}44;background:${sub.color}15;padding:2px 6px;border-radius:6px;">Target ${sub.target}</span></div>
        <div class="pmastery-pct" style="color:${sub.color}">${m}%</div>
      </div>
      <div class="pmastery-bar-bg"><div class="pmastery-bar-fill" style="width:${m}%;background:${sub.color}"></div></div>
      <div class="pmastery-sub">${s} session${s===1?'':'s'} logged</div>
    </div>`;
  }).join('')}

  <div class="pf-section-lbl">Achievements · ${unlockedCount}/${ACHIEVEMENTS.length}</div>
  <div class="badge-grid">
    ${ACHIEVEMENTS.map(a=>{
      const unlocked=a.test(state);
      return `<div class="badge-tile ${unlocked?'unlocked':''}">
        <div class="badge-icon">${a.icon}</div>
        <div class="badge-title">${a.title}</div>
        <div class="badge-desc">${a.desc}</div>
      </div>`;
    }).join('')}
  </div>

  <div class="pf-section-lbl">Danger Zone</div>
  <button class="pf-reset-btn" onclick="resetProgress()">🗑️ Reset All Progress</button>
  `;
  document.getElementById("profile-content").innerHTML=h;
}

loadState();render();

/* ===== Loading Screen Logic ===== */
(function(){
  const quotes=[
    "Excellence is a habit, not an act.",
    "Every topic mastered is a step closer to your A1.",
    "Discipline today. Success on results day."
  ];
  const qEl=document.getElementById("ld-quote");
  let qi=0;
  function showQuote(i){
    qEl.style.animation="none";
    qEl.offsetHeight; /* reflow to restart animation */
    qEl.textContent=quotes[i];
    qEl.style.animation="ldQuoteFade 1s ease forwards";
  }
  showQuote(0);
  const qTimer=setInterval(()=>{
    qi=(qi+1)%quotes.length;
    showQuote(qi);
  },1000);
  setTimeout(()=>{
    clearInterval(qTimer);
    const loader=document.getElementById("loader");
    loader.classList.add("hide");
    setTimeout(()=>{loader.remove();},550);
  },3000);
})();
</script>
</body>
